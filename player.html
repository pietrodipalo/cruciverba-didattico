<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cruciverba — Istituto Janus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f0f2f5;min-height:100vh;padding:20px;}
.wrap{max-width:960px;margin:0 auto;}
.header{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:16px;border:1px solid #e0e0e0;display:flex;align-items:center;gap:20px;border-bottom:3px solid #2D3166;}
.header img{height:55px;width:auto;}
.header h1{font-size:20px;font-weight:600;color:#2D3166;margin-bottom:2px;}
.header p{font-size:13px;color:#4A5080;}
.card{background:#fff;border-radius:12px;padding:24px;border:1px solid #e0e0e0;margin-bottom:16px;}
.loading{text-align:center;padding:60px;color:#888;font-size:15px;}
.error-box{text-align:center;padding:40px;color:#a00;}
#cw-grid{display:inline-grid;gap:2px;border:2px solid #222;padding:2px;background:#222;border-radius:4px;overflow:auto;}
.cell{width:30px;height:30px;background:#fff;border-radius:2px;position:relative;}
.cell.black{background:#1a1a1a;}
.cell input{width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:14px;font-weight:600;text-transform:uppercase;color:#111;cursor:pointer;padding:0;font-family:inherit;outline:none;}
.cell input:focus{background:#d6eaff;}
.cell input.ok{background:#c8f0d0!important;color:#1a6b2a!important;}
.cell input.ko{background:#ffd0d0!important;color:#a00!important;}
.cell-num{position:absolute;top:1px;left:2px;font-size:7px;color:#777;line-height:1;pointer-events:none;z-index:1;}
.cw-title{font-size:20px;font-weight:600;color:#2D3166;margin-bottom:16px;}
.clues{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;}
.clues h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#444;margin-bottom:8px;}
.clue-item{font-size:13px;color:#555;padding:6px 0;border-bottom:1px solid #f0f0f0;line-height:1.5;cursor:pointer;}
.clue-item:hover{color:#111;}
.clue-item b{color:#111;}
.btns{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;}
button{padding:9px 16px;font-size:13px;border:1px solid #ddd;border-radius:7px;background:#fff;cursor:pointer;font-family:inherit;transition:all .15s;}
button:hover{background:#f5f5f5;}
button.dark{background:#2D3166;color:#fff;border-color:#2D3166;}
button.dark:hover{background:#1e2147;}
#score{font-size:13px;color:#555;padding:8px 12px;background:#f5f5f5;border-radius:7px;margin-top:8px;display:none;}
.footer{text-align:center;padding:20px;font-size:12px;color:#aaa;margin-top:8px;}
.footer img{height:28px;opacity:0.4;margin-bottom:6px;display:block;margin-left:auto;margin-right:auto;}
</style>
</head>

<script>
const SUPABASE_URL = 'https://witakmuimujwymxihxeu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpdGFrbXVpbXVqd3lteGloeGV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTg3ODAsImV4cCI6MjA5NTI3NDc4MH0.00uHdEAf1lbcSzv2yMMR3v6dtJvtXRqSgTSMZYLIZcY';

let CW = null;

async function loadCruciverba() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/Cruciverba?id=eq.' + id + '&select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await res.json();
    if (!data.length) { showError(); return; }

    const record = data[0];
    CW = JSON.parse(record.dati);
    document.getElementById('page-title').textContent = record.titolo;
    document.getElementById('cw-title').textContent = record.titolo;
    document.title = 'Cruciverba — ' + record.titolo;
    renderGrid();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('cw-content').style.display = 'block';
  } catch(e) {
    showError();
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-box').style.display = 'block';
}

function renderGrid() {
  const gridEl = document.getElementById('cw-grid');
  gridEl.style.gridTemplateColumns = `repeat(${CW.cols},30px)`;
  gridEl.style.gridTemplateRows = `repeat(${CW.rows},30px)`;
  gridEl.innerHTML = '';

  for (let r = 0; r < CW.rows; r++) for (let c = 0; c < CW.cols; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (!CW.grid[r][c] ? ' black' : '');
    cell.dataset.r = r; cell.dataset.c = c;
    if (CW.grid[r][c]) {
      const num = CW.numbered.find(n => n.r === r && n.c === c);
      if (num) { const s = document.createElement('span'); s.className = 'cell-num'; s.textContent = num.n; cell.appendChild(s); }
      const inp = document.createElement('input');
      inp.type = 'text'; inp.maxLength = 1;
      inp.dataset.a = CW.grid[r][c];
      inp.dataset.r = r; inp.dataset.c = c;
      inp.addEventListener('input', e => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-ZÀÈÌÒÙ]/g,'');
        checkWord(e.target);
      });
      inp.addEventListener('keydown', navKey);
      cell.appendChild(inp);
    }
    gridEl.appendChild(cell);
  }

  const cluesEl = document.getElementById('clues');
  let acH = '<h3>→ Orizzontali</h3>', dwH = '<h3>↓ Verticali</h3>';
  [...CW.placed].sort((a,b)=>a.num-b.num).forEach(p => {
    const item = `<div class="clue-item" onclick="focusWord(${p.row},${p.col})"><b>${p.num}.</b> ${p.clue}</div>`;
    if (p.dir==='across') acH+=item; else dwH+=item;
  });
  cluesEl.innerHTML = `<div>${acH}</div><div>${dwH}</div>`;
}

function getCell(r,c) { return document.querySelector(`#cw-grid input[data-r="${r}"][data-c="${c}"]`); }
function focusWord(r,c) { const i=getCell(r,c); if(i) i.focus(); }

function checkWord(inp) {
  const r=+inp.dataset.r, c=+inp.dataset.c;
  CW.placed.forEach(p => {
    const dr=p.dir==='down'?1:0, dc=p.dir==='across'?1:0;
    const inWord=Array.from({length:p.word.length},(_,i)=>{return{r:p.row+i*dr,c:p.col+i*dc}}).some(pos=>pos.r===r&&pos.c===c);
    if(!inWord) return;
    const cells=Array.from({length:p.word.length},(_,i)=>getCell(p.row+i*dr,p.col+i*dc));
    const allFilled=cells.every(ci=>ci&&ci.value);
    if(!allFilled){cells.forEach(ci=>{if(ci){ci.classList.remove('ok','ko');}});return;}
    const correct=cells.every((ci,i)=>ci&&ci.value===p.word[i]);
    if(correct){cells.forEach(ci=>{if(ci){ci.classList.add('ok');ci.classList.remove('ko');ci.disabled=true;}});}
    else{cells.forEach(ci=>{if(ci){ci.classList.add('ko');ci.classList.remove('ok');}});}
  });
}

function navKey(e) {
  const r=+e.target.dataset.r, c=+e.target.dataset.c;
  if(e.key==='ArrowRight'){const n=getCell(r,c+1);if(n)n.focus();}
  else if(e.key==='ArrowLeft'){const n=getCell(r,c-1);if(n)n.focus();}
  else if(e.key==='ArrowDown'){const n=getCell(r+1,c);if(n)n.focus();}
  else if(e.key==='ArrowUp'){const n=getCell(r-1,c);if(n)n.focus();}
  else if(e.key==='Backspace'&&!e.target.value){const n=getCell(r,c-1)||getCell(r-1,c);if(n){n.value='';n.focus();}}
}

function verify() {
  let ok=0,tot=0;
  document.querySelectorAll('#cw-grid input').forEach(i=>{
    i.classList.remove('ok','ko');tot++;
    if(i.value){if(i.value===i.dataset.a){i.classList.add('ok');ok++;}else i.classList.add('ko');}
  });
  const sc=document.getElementById('score');
  sc.style.display='block';
  sc.textContent=ok+'/'+tot+' corrette';
}

function sol() {
  document.querySelectorAll('#cw-grid input').forEach(i=>{i.value=i.dataset.a;i.classList.remove('ko');i.classList.add('ok');});
}

function rst() {
  document.querySelectorAll('#cw-grid input').forEach(i=>{i.value='';i.classList.remove('ok','ko');i.disabled=false;});
  document.getElementById('score').style.display='none';
}

loadCruciverba();
</script>
